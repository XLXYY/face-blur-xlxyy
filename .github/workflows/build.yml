name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git autoconf libtool pkg-config \
            libssl-dev libffi-dev python3-dev zip unzip openjdk-17-jdk \
            cmake libltdl-dev ninja-build

      - name: Completely remove preinstalled Android SDK/NDK
        run: |
          sudo rm -rf /usr/local/lib/android/sdk
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK_HOME ANDROID_NDK_ROOT

      - name: Install Buildozer
        run: |
          pip install buildozer cython

      - name: Download face models
        run: |
          mkdir -p models
          wget -O models/yunet.onnx https://github.com/opencv/opencv_zoo/raw/main/models/face_detection_yunet/face_detection_yunet_2023mar.onnx
          wget -O models/sface.onnx https://github.com/opencv/opencv_zoo/raw/main/models/face_recognition_sface/face_recognition_sface_2021dec.onnx

      # ---------- 关键修复：手动下载 SDL2_image 到缓存目录 ----------
      - name: Pre-download SDL2_image to avoid build stuck
        run: |
          SDL2_IMAGE_URL="https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz"
          CACHE_DIR="/home/runner/.buildozer/cache"
          mkdir -p "$CACHE_DIR"
          echo "Downloading SDL2_image..."
          wget -q "$SDL2_IMAGE_URL" -O "$CACHE_DIR/SDL2_image-2.8.2.tar.gz"
          echo "SDL2_image cached."
      # ----------------------------------------------------------

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 星澜小月月人脸处理-APK
          path: bin/*.apk
