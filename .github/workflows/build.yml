name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            autoconf \
            libtool \
            pkg-config \
            libssl-dev \
            libffi-dev \
            python3-dev \
            zip \
            unzip \
            openjdk-17-jdk \
            cmake \
            libltdl-dev

      - name: Remove preinstalled Android SDK/NDK (avoids conflict)
        run: |
          sudo rm -rf /usr/local/lib/android/sdk

      - name: Install Buildozer
        run: |
          pip install buildozer cython

      - name: Download face models
        run: |
          mkdir -p models
          wget -O models/yunet.onnx https://github.com/opencv/opencv_zoo/raw/main/models/face_detection_yunet/face_detection_yunet_2023mar.onnx
          wget -O models/sface.onnx https://github.com/opencv/opencv_zoo/raw/main/models/face_recognition_sface/face_recognition_sface_2021dec.onnx

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 星澜小月月人脸处理-APK
          path: bin/*.apk
